# E2E fixture: workflow with untrusted third-party actions (supply-chain risk)
name: E2E Supply Chain Untrusted

on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4 (trusted)
      - uses: some-org/some-action@abc1234def5678901234567890abcdef01234567  # untrusted publisher
      - uses: another-org/tool@deadbeefdeadbeefdeadbeefdeadbeefdeadbeef      # untrusted publisher
