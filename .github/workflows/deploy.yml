name: Deploy to PyPI

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write  # required for publishing GitHub release
    id-token: write  # required for PyPI trusted publishing

jobs:
    build-and-publish:
        runs-on: ubuntu-latest
        environment: pypi

        steps:
            - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
              with:
                  fetch-depth: 0  # required for hatch-vcs version detection

            - name: Set up Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
              with:
                  python-version: "3.11"

            - name: Install build tools
              run: pip install hatch hatch-vcs

            - name: Run tests
              run: |
                  pip install -e ".[dev]"
                  pytest

            - name: Build package
              run: hatch build

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4

            - name: Publish GitHub release
              uses: release-drafter/release-drafter@67e173cadb2fbd3de94f4a861e0c48c913b462ae # v6.4.0
              with:
                  publish: true
                  tag: ${{ github.ref_name }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
