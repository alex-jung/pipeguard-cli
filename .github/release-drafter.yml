name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
    - title: "Features"
      labels:
          - "feature"
          - "enhancement"
    - title: "Bug Fixes"
      labels:
          - "bug"
          - "fix"
    - title: "Security"
      labels:
          - "security"
    - title: "Documentation"
      labels:
          - "documentation"
          - "docs"
    - title: "Maintenance"
      labels:
          - "chore"
          - "dependencies"
          - "ci"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
    major:
        labels:
            - "breaking-change"
    minor:
        labels:
            - "feature"
            - "enhancement"
    patch:
        labels:
            - "bug"
            - "fix"
            - "security"
            - "documentation"
            - "chore"
    default: patch

template: |
    ## Changes

    $CHANGES

    ---
    **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION
