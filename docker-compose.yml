services:
  mock-server:
    build:
      context: ./mock_server
    ports:
      - "8080:8080"
    environment:
      FLASK_ENV: development
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
